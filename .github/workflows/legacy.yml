name: Legacy 2017 TVs
on: [push, pull_request]

jobs:
  legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - run: pnpm --version
      - run: pnpm install

      - run: pnpm run legacy:verify
      - run: pnpm -C packages/core run build